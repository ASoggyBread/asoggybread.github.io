<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Page 1</title>

  <link rel="stylesheet" href="styles.css">

  <style>
    body {
      margin: 0;
      background-color: #2e2e2e;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .content {
      padding-top: 50px;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 20px;
      padding: 40px;
    }

    a {
      color: #ccc;
      text-decoration: none;
      display: inline-block;
      margin-top: 20px;
    }


    .slot {
      height: 150px;
      width: 150px;
      border: 2px solid white;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.2s;
    }

    .slot:hover {
      background-color: #444;
      transform: scale(1.05);
    }

  </style>
</head>

<body>


<div id="header-placeholder"></div>

<h2>Game Title</h2>

<div class="container">
  <div class="slot" onclick="goToPage('page1.html')">Slot 1</div>
  <div class="slot" onclick="goToPage('page2.html')">Slot 2</div>
  <div class="slot" onclick="goToPage('page3.html')">Slot 3</div>
  <div class="slot" onclick="goToPage('page4.html')">Slot 4</div>
</div>

<div class="content">
  <h1></h1>
  <a href="index.html">← Back to Home</a>
</div>

<script>
  fetch('header.html')
    .then(res => res.text())
    .then(data => {
      document.getElementById('header-placeholder').innerHTML = data;
    });
</script>	

</body>
</html>
