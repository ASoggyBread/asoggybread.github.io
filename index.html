<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>asoggybread.github.io</title>

  <link rel="stylesheet" href="styles.css">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #2e2e2e;
      color: white;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 20px;
      padding: 40px;
    }

    .slot {
      height: 150px;
      width: 150px;
      border: 2px solid white;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.2s;
    }

    .slot:hover {
      background-color: #444;
      transform: scale(1.05);
    }
  </style>
</head>

<body>

<div id="header-placeholder"></div>

<div class="container">
  <div class="slot" onclick="goToPage('LifeSim.html')">LifeSim</div>
</div>

<script>
  fetch('header.html')
    .then(res => res.text())
    .then(data => {
      document.getElementById('header-placeholder').innerHTML = data;
    });

  function goToPage(url) {
    window.location.href = url;
  }
</script>

</body>
</html>
