<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Website</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #2e2e2e;
      color: white;
    }

    header {
      text-align: center;
      padding: 20px;
      font-size: 2em;
      font-weight: bold;
      background-color: #3a3a3a;
      border-bottom: 2px solid #555;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 20px;
      padding: 40px;
    }

    .slot {
      height: 150px;
      border: 2px solid white;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.2s;
      background-color: transparent;
    }

    .slot:hover {
      background-color: #444;
      transform: scale(1.05);
    }
  </style>
<head>
  <meta charset="UTF-8">
  <title>asoggybread</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <span class="title-part part1">a</span>
  <span class="title-part part2">soggy</span>
  <span class="title-part part3">bread</span>
</header>

<div class="container">
  <div class="slot" onclick="goToPage('page1.html')">Slot 1</div>
  <div class="slot" onclick="goToPage('page2.html')">Slot 2</div>
  <div class="slot" onclick="goToPage('page3.html')">Slot 3</div>
  <div class="slot" onclick="goToPage('page4.html')">Slot 4</div>
</div>

<script>
  function goToPage(url) {
    window.location.href = url;
  }
</script>

</body>
</html>
